name: n-strategy-scan

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC.
    # 07:20 UTC = 15:20 Asia/Shanghai, suitable for A-share post-close scans.
    - cron: "20 7 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_MESSAGE_MODE: text
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: n_strategy.db
          key: n-strategy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            n-strategy-db-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall .

      - name: Test Feishu secret
        if: github.event_name == 'workflow_dispatch'
        run: python main.py --test-notify

      - name: Run scanner
        run: python main.py --notify --allow-empty --top 20
