name: n-strategy-scan

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "20 7 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall .

      - name: Test Feishu secret
        run: python main.py --test-notify

      - name: Run scanner
        run: python main.py --limit 100 --notify --allow-empty
