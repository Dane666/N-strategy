name: n-strategy-backtest

on:
  workflow_dispatch:
  schedule:
    # 08:45 UTC = 16:45 Asia/Shanghai every Monday.
    - cron: "45 8 * * 1"

jobs:
  backtest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        window:
          - label: 6m
            months: 6
          - label: 1m
            months: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: n_strategy.db
          key: n-strategy-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            n-strategy-db-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m compileall .

      - name: Run backtest
        run: |
          python backtest.py \
            --months ${{ matrix.window.months }} \
            --include-fallback \
            --top 20 \
            --progress-every 200 \
            --detail-output backtest_trades_${{ matrix.window.label }}.csv \
            --summary-output backtest_summary_${{ matrix.window.label }}.json

      - name: Upload backtest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: n-strategy-backtest-${{ matrix.window.label }}
          path: |
            backtest_trades_${{ matrix.window.label }}.csv
            backtest_summary_${{ matrix.window.label }}.json
